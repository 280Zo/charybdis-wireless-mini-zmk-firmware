## Prospector dongle variant for hardware with the APDS9960 ambient light sensor fitted.

CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y

# The 280Zo Prospector fork has the patched APDS9960 behavior
# this dongle needs. Keep Zephyr's stock APDS9960 driver
# out of this build so both drivers do not bind the same
# sensor at the same time.
CONFIG_APDS9960=n
CONFIG_PROSPECTOR_APDS9960=y
