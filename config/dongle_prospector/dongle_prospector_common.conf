## Shared Prospector dongle settings for the nice!nano-based stacked build.

# Disable ZMK Studio to preserve RAM alongside LVGL/display features.
CONFIG_ZMK_STUDIO=n

# Reduce LVGL RAM usage using the upstream Prospector recommendation.
CONFIG_LV_Z_VDB_SIZE=25

# Blank the display after idle keyboard time. Idle is measured by ZMK activity
# state and is currently set to 30 seconds here for Prospector builds.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=30000


## GENERAL

# Convert layer names to uppercase (Operator and Radii only)
CONFIG_PROSPECTOR_LAYER_NAME_UPPERCASE=y

## Modifiers

# Display modifier key indicators
CONFIG_PROSPECTOR_SHOW_MODIFIERS=y

# Show inactive modifiers dimmed (Classic and Field only)
CONFIG_PROSPECTOR_SHOW_INACTIVE_MODIFIERS=y

# Order of modifiers: G=GUI, A=Alt, C=Ctrl, S=Shift
CONFIG_PROSPECTOR_MODIFIER_ORDER="GACS"

## Field-specific

# WPM value at which animation reaches max speed
CONFIG_PROSPECTOR_ANIMATION_WPM_REFERENCE=80

# Seconds for lines to fade out after typing stops
CONFIG_PROSPECTOR_ANIMATION_INTENSITY_DECAY_SEC=30

# Seconds for line directions and length to settle
CONFIG_PROSPECTOR_ANIMATION_FLOW_DECAY_SEC=300
