CONFIG_ZMK_USB=n # ZMK_USB is only allowed when: not split or, split and role is central (i.e., not left)

# Disable deep sleep on the left peripheral. Must be set here (not in the
# shield-level boards/shields/charybdis/charybdis_left.conf) because
# config/charybdis.conf is merged AFTER the shield conf and re-enables sleep
# (CONFIG_ZMK_SLEEP=y, CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000). A user-level
# conf like this one is merged last, so it wins.
#
# The right half stays awake on its own via trackball polling; the left half
# has no such activity, so without this it deep-sleeps after 10min idle and
# requires a physical power cycle to recover — keypresses don't wake it.
CONFIG_ZMK_SLEEP=n
