# Build matrix describing every board/shield/keymap combo to build.
# Each entry under `include` becomes a single matrix item in CI and
# the local build script.

board: [ nice_nano//zmk ]

include:

# ── Bluetooth (BT) Firmwares ─────────────────────────────────────────────────────────────
  - name: bt
    board: nice_nano//zmk
    shield:
      - charybdis_left_bt
      - charybdis_right_bt
    keymap:
      - qwerty
      - colemak_dh
      - canary

# ── Standard Dongle Firmwares ─────────────────────────────────────────────────
  - name: standard_dongle
    board: nice_nano//zmk
    shield:
      - charybdis_left_dongle
      - charybdis_right_dongle
      - charybdis_dongle
    keymap:
      - qwerty
      - colemak_dh
      - canary

# ── NiceNano Prospector Dongle with Touch (Waveshare 887) Screen Firmwares (not yet implemented) ────────────────────────
