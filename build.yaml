# Build matrix describing every board/shield/keymap combo to build.
# Each entry under `include` becomes a single matrix item in CI and
# the local build script.

board: [ nice_nano//zmk ]

include:

# ── Reset Firmware ────────────────────────────────────────────────────────────
  - name: settings_reset
    board: nice_nano//zmk
    shield: settings_reset

# ── Bluetooth (BT) Firmwares ─────────────────────────────────────────────────────────────
  - name: bt
    board: nice_nano//zmk
    shield:
      - charybdis_left_bt
      - charybdis_right_bt
    keymap:
      - qwerty
      - colemak_dh
      # - canary
      # - focal
      # - graphite

# ── Standard Dongle Firmwares ─────────────────────────────────────────────────
  - name: dongle_standard_nano
    board: nice_nano//zmk
    shield:
      - charybdis_left_dongle
      - charybdis_right_dongle
      - charybdis_dongle
    keymap:
      - qwerty
      - colemak_dh
      # - canary
      # - focal
      # - graphite

# ── Prospector Dongle (Display Screen) Firmwares ──────────────────────────

  # Prospector builds support any Waveshare screen with the ST7789V2 display driver IC
  # including the touch (SKU 27057) and non-touch (SKU 24382) screens.

  # Prospector layout selection:
    # Operator is the default selection; swap in one of the files below to change the layout:
    #   - dongle_prospector_layouts/dongle_prospector_layout_classic.conf
    #   - dongle_prospector_layouts/dongle_prospector_layout_radii.conf
    #   - dongle_prospector_layouts/dongle_prospector_layout_field.conf
    #   - dongle_prospector_layouts/dongle_prospector_layout_operator.conf
    #
    # Radii-only color themes are selected with an extra overlay:
    #   - dongle_prospector_themes/dongle_prospector_theme_blue.overlay
    #   - dongle_prospector_themes/dongle_prospector_theme_green.overlay
    #   - dongle_prospector_themes/dongle_prospector_theme_red.overlay
    #   - dongle_prospector_themes/dongle_prospector_theme_purple.overlay


# ── Prospector Nice Nano v2 Dongle w/o APDS9960 ambient light sensor ──────────────────────────
  - name: dongle_prospector_nano_no_sensor
    board: nice_nano//zmk
    keymap:
      - qwerty
      - colemak_dh
      # - canary
    builds:
      - shield: charybdis_left_dongle
      - shield: charybdis_right_dongle
      - shield: "charybdis_dongle prospector_adapter"
        extra_conf_files:
          - dongle_prospector/dongle_prospector_common.conf
          - dongle_prospector_layouts/dongle_prospector_layout_operator.conf
          - dongle_prospector/dongle_prospector_no_sensor.conf
        extra_dtc_overlay_files:
          - dongle_prospector/dongle_prospector_no_sensor.overlay

# ── Prospector Nice Nano v2 Dongle with APDS9960 ambient light sensor ──────────────────────────
  - name: dongle_prospector_nano_sensor
    board: nice_nano//zmk
    keymap:
      - qwerty
      - colemak_dh
      # - canary
    builds:
      - shield: charybdis_left_dongle
      - shield: charybdis_right_dongle
      - shield: "charybdis_dongle prospector_adapter"
        extra_conf_files:
          - dongle_prospector/dongle_prospector_common.conf
          - dongle_prospector_layouts/dongle_prospector_layout_operator.conf
          - dongle_prospector/dongle_prospector_sensor.conf

# ── Prospector XIAO BLE w/o APDS9960 ambient light sensor ──────────────
  - name: dongle_prospector_xiao_no_sensor
    board: xiao_ble//zmk
    keymap:
      - qwerty
      - colemak_dh
      # - canary
    builds:
      - shield: charybdis_left_dongle
        board: nice_nano//zmk
      - shield: charybdis_right_dongle
        board: nice_nano//zmk
      - shield: "charybdis_dongle prospector_adapter"
        extra_conf_files:
          - dongle_prospector/dongle_prospector_common.conf
          - dongle_prospector_layouts/dongle_prospector_layout_operator.conf
          - dongle_prospector/dongle_prospector_no_sensor.conf
        extra_dtc_overlay_files:
          - dongle_prospector/dongle_prospector_no_sensor.overlay

# ── Prospector XIAO BLE with APDS9960 ambient light sensor ──────────────
  - name: dongle_prospector_xiao_sensor
    board: xiao_ble//zmk
    keymap:
      - qwerty
      - colemak_dh
      # - canary
    builds:
      - shield: charybdis_left_dongle
        board: nice_nano//zmk
      - shield: charybdis_right_dongle
        board: nice_nano//zmk
      - shield: "charybdis_dongle prospector_adapter"
        extra_conf_files:
          - dongle_prospector/dongle_prospector_common.conf
          - dongle_prospector_layouts/dongle_prospector_layout_operator.conf
          - dongle_prospector/dongle_prospector_sensor.conf
