## PMW3610 sensor — Zephyr 4.1 includes the driver natively.
## Driver is auto-enabled via DT_HAS_PIXART_PMW3610_ENABLED.
## Axis invert and smart-mode are set in charybdis_pmw3610.dtsi.
## XY swap is applied via zip_xy_transform in charybdis_pointer.dtsi.
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
