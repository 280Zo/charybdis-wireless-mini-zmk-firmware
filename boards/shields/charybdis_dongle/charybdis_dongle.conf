## Split keyboards
## https://zmk.dev/docs/config/system#split-keyboards
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

## Display Configuration
## https://zmk.dev/docs/config/displays
# CONFIG_ZMK_DISPLAY=n

# ## Track words per minute
# CONFIG_ZMK_WPM=y

## PMW3610 sensor — Zephyr 4.1 includes the driver natively.
## Driver is auto-enabled via DT_HAS_PIXART_PMW3610_ENABLED.
## Axis invert and smart-mode are set in charybdis_pmw3610.dtsi.
## XY swap is applied via zip_xy_transform in charybdis_pointer.dtsi.
CONFIG_SPI=y
CONFIG_INPUT=y
