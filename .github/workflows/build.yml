name: Build and Release ZMK Firmware
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
# ──────────────────────────────────────────────────────────────
#  SET-UP read build.yaml & save matrix JSON as groups
# ──────────────────────────────────────────────────────────────
  build-matrix:
    name: Build Matrix
    runs-on: ubuntu-latest
    outputs:
      groups:         ${{ steps.make-groups.outputs.groups }}
      release-groups: ${{ steps.make-groups.outputs.release-groups }}

    env:
      # repo-local bin dir for tools; ends up on $PATH
      LOCAL_BIN_DIR: ${{ github.workspace }}/.bin
      YQ_VERSION: v4.44.3
      JQ_VERSION: jq-1.7.1

    steps:
      - name: Checkout repo (no submodules)
        uses: actions/checkout@v5

      - name: Install yq + jq (version-pinned, repo-local)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$LOCAL_BIN_DIR"
          echo "$LOCAL_BIN_DIR" >> "$GITHUB_PATH"

          # yq
          if [ ! -x "$LOCAL_BIN_DIR/yq" ]; then
            echo "Installing yq $YQ_VERSION..."
            curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o "$LOCAL_BIN_DIR/yq"
            chmod 0755 "$LOCAL_BIN_DIR/yq"
          else
            echo "yq already installed at $("$LOCAL_BIN_DIR/yq" --version)"
          fi

          # jq
          if [ ! -x "$LOCAL_BIN_DIR/jq" ]; then
            echo "Installing jq $JQ_VERSION..."
            curl -fsSL "https://github.com/jqlang/jq/releases/download/${JQ_VERSION}/jq-linux-amd64" -o "$LOCAL_BIN_DIR/jq"
            chmod 0755 "$LOCAL_BIN_DIR/jq"
          else
            echo "jq already installed at $("$LOCAL_BIN_DIR/jq" --version)"
          fi

      - id: make-groups
        name: Build matrix from build.yaml
        shell: bash
        run: |
          set -euo pipefail
          test -f build.yaml || { echo "build.yaml not found at repo root"; exit 1; }

          groups_json=$(
            yq -o=json '.include' build.yaml | \
            jq -c '
              map(
                . as $r
                | ($r.shield | (if type=="array" then . else [.] end)) as $shields
                | (if has("keymap") then ($r.keymap | (if type=="array" then . else [.] end)) else [null] end) as $keymaps
                | [ range(0; ($shields|length)) as $i
                    | range(0; ($keymaps|length)) as $j
                    | {
                        board:  $r.board,
                        shield: $shields[$i],
                        keymap: $keymaps[$j],
                        snippet: ($r.snippet // null),
                        name:   ($r.name // (
                                  ($r.board|tostring) + "-" +
                                  ($shields[$i]|tostring) +
                                  (if $keymaps[$j] then "-" + ($keymaps[$j]|tostring) else "" end)
                                )),
                        format: ($r.format // "uf2")
                      }
                  ]
              ) | add
            '
          )

          # Unique (name, keymap) pairs drive the group-artifacts matrix.
          # Pattern: "charybdis-{name}-*-{keymap}" or "charybdis-{name}-*" for no-keymap.
          release_groups_json=$(
            echo "$groups_json" | jq -c '
              [ .[] | {
                  name:    .name,
                  keymap:  .keymap,
                  pattern: ("charybdis-" + .name + "-*" + (if .keymap then "-" + .keymap else "" end))
                }
              ] | unique
            '
          )

          echo "groups=${groups_json}"          >> "$GITHUB_OUTPUT"
          echo "release-groups=${release_groups_json}" >> "$GITHUB_OUTPUT"
          echo "Build Matrix:"
          echo "$groups_json" | jq .
          echo "Release Groups:"
          echo "$release_groups_json" | jq .


# ──────────────────────────────────────────────────────────────
#  BUILD
# ──────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.group.shield }}${{ matrix.group.keymap && format(' [{0}]', matrix.group.keymap) || '' }})
    needs: build-matrix
    runs-on: ubuntu-latest
    container: zmkfirmware/zmk-build-arm:stable

    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.build-matrix.outputs.groups) }}

    steps:
    # ───────── checkout user config (this repo) ─────────
    - name: Checkout zmk-config repo
      uses: actions/checkout@v5

    - name: Initialise West workspace
      shell: bash
      run: |
        set -euxo pipefail
        echo "Initializing the west workspace using local manifest at config/west.yml"
        west init -l "$GITHUB_WORKSPACE/config"
        west update
        echo "Exporting Zephyr for external build system integration."
        west zephyr-export

        # # ───────── DEBUG LOGS ─────────
        # echo ""
        # echo "Debug Logs"
        # echo "Top dir  : $(west topdir)"
        # echo "Projects :"
        # ls -1 $(west topdir)     # you'll see zmk, zephyr, modules/ …
        # echo "West workspace ready. Project structure:"
        # west list

    # ───────── verify keymaps under config/keymaps/ ─────────
    - name: Verify requested keymap exists
      if: ${{ matrix.group.keymap && matrix.group.keymap != '' }}
      shell: bash
      run: |
        set -euo pipefail
        f="config/keymaps/${{ matrix.group.keymap }}.keymap"
        test -f "$f" || { echo "[ERROR] Missing keymap file: $f"; exit 1; }
        echo "Found $f"

    # ───────── Build ─────────
    - name: Build ${{ matrix.group.shield }}${{ matrix.group.keymap && format(' [{0}]', matrix.group.keymap) || '' }}
      shell: bash
      working-directory: zmk/app
      run: |
        set -euo pipefail

        KM="${{ matrix.group.keymap }}"
        FM="${{ matrix.group.format }}"   # artifact format (e.g., uf2)
        NM="${{ matrix.group.name }}"
        BD="${{ matrix.group.board }}"
        SH="${{ matrix.group.shield }}"

        CONFIG_DIR="$GITHUB_WORKSPACE/config"
        BUILD_DIR=$(mktemp -d)

        # snippet: explicit from matrix wins; else auto for right-half (non-dongle)
        if [[ -n "${{ matrix.group.snippet || '' }}" ]]; then
          SNIPPET_OPTION="-DSNIPPET=${{ matrix.group.snippet }}"
        elif [[ "$SH" == *right* && "$SH" != *dongle* ]]; then
          SNIPPET_OPTION="-DSNIPPET=studio-rpc-usb-uart"
        else
          SNIPPET_OPTION=""
        fi

        # Copy the selected keymap into the config dir named after the shield.
        # ZMK's cmake finds keymaps by searching for ${shield}.keymap in ZMK_CONFIG.
        if [[ -n "${KM:-}" ]]; then
          cp "$CONFIG_DIR/keymaps/${KM}.keymap" "$CONFIG_DIR/${SH}.keymap"
        fi

        echo "Build vars"
        echo "→ Keymap (KM): $KM"
        echo "→ Format (FM): $FM"
        echo "→ Name   (NM): $NM"
        echo "→ Board  (BD): $BD"
        echo "→ Shield (SH): $SH"
        echo "→ Dir        : $(pwd)"
        echo "→ Snippet    : $SNIPPET_OPTION"
        echo "→ Build dir  : $BUILD_DIR"

        # ──────────────────────────────────────────────────────────────
        echo "west build…"
        west build -p \
          -d "$BUILD_DIR" \
          -b "$BD" \
          -- \
          "-DZMK_CONFIG=$CONFIG_DIR" \
          "-DZMK_EXTRA_MODULES=$GITHUB_WORKSPACE/boards;$GITHUB_WORKSPACE/zmk-pmw3610-driver" \
          "-DSHIELD=$SH" \
          $SNIPPET_OPTION
        # ──────────────────────────────────────────────────────────────

        ART=$(if [[ -f "$BUILD_DIR/zephyr/zmk.uf2" ]]; then echo zmk.uf2; else echo zmk.bin; fi)
        EXT="${ART##*.}"
        # Include keymap in filename so multiple keymaps for the same shield don't overwrite.
        FNAME="${SH}${KM:+-${KM}}.${EXT}"
        mkdir -p "$GITHUB_WORKSPACE/out/$NM"
        cp "$BUILD_DIR/zephyr/$ART" "$GITHUB_WORKSPACE/out/$NM/$FNAME"

    - name: Upload firmware bundle
      uses: actions/upload-artifact@v7
      with:
        # Include group name so group-artifacts patterns are trivial: charybdis-{name}-*-{keymap}
        name: charybdis-${{ matrix.group.name }}-${{ matrix.group.shield }}${{ matrix.group.keymap && format('-{0}', matrix.group.keymap) || '' }}
        path: ${{ github.workspace }}/out/${{ matrix.group.name }}/**

# ──────────────────────────────────────────────────────────────
#  GROUP - merge per-shield artifacts into logical bundles
# ──────────────────────────────────────────────────────────────
  group-artifacts:
    name: Group ${{ matrix.group.name }}${{ matrix.group.keymap && format(' [{0}]', matrix.group.keymap) || '' }}
    needs: [build, build-matrix]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        group: ${{ fromJson(needs.build-matrix.outputs.release-groups) }}

    steps:
    - uses: actions/download-artifact@v8
      with:
        pattern: ${{ matrix.group.pattern }}
        merge-multiple: true
        path: firmware/

    - uses: actions/upload-artifact@v7
      with:
        name: firmware-${{ matrix.group.name }}${{ matrix.group.keymap && format('-{0}', matrix.group.keymap) || '' }}
        path: firmware/

# ──────────────────────────────────────────────────────────────
#  CLEANUP - delete the individual per-shield artifacts
# ──────────────────────────────────────────────────────────────
  cleanup-artifacts:
    name: Clean up per-shield artifacts
    needs: group-artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
    - uses: geekyeggo/delete-artifact@v6
      with:
        name: charybdis-*

# ──────────────────────────────────────────────────────────────
#  RELEASE - zip grouped bundles and attach to the tag release
# ──────────────────────────────────────────────────────────────
  release-firmware:
    name: Release Firmware
    needs: group-artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions: { contents: write }

    steps:
    - uses: actions/download-artifact@v8
      with:
        pattern: firmware-*
        path: combo-artifacts/

    - name: Zip firmware groups; leave settings_reset as raw file
      working-directory: combo-artifacts
      run: |
        for d in */; do
          name="${d%/}"
          if [[ "$name" != *settings_reset* ]]; then
            zip -j "${name}.zip" "$d"*
          fi
        done

    - uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Firmware Release ${{ github.ref_name }}
        files: |
          combo-artifacts/*.zip
          combo-artifacts/firmware-settings_reset/settings_reset.uf2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
