name: Draw keymaps
run-name: Draw keymaps

env:
  KEYMAP_BG: "#181A1B"
  KEYMAP_GAP: "30"
  KEYMAP_MARGIN: "20"
  KEYMAP_SCALE: "2"
  KEYMAP_HINTING: "medium"
  KEYMAP_LEGEND: "1"
  # Negative trims collapse built-in SVG top/bottom whitespace so KEYMAP_GAP is the real spacing control.
  KEYMAP_STACKED_TRIM_BOTTOM: "-71"
  KEYMAP_LEGEND_TRIM_TOP: "-58"
  KEYMAP_LEGEND_TRIM_BOTTOM: "-58"
  KEYMAP_COMBOS_TRIM_TOP: "-60"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  draw_keymaps:
    name: Generate Keymaps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install keymap-drawer
        run: |
          # Ubuntu has made it difficult to install keymap-drawer globally, so using venv instead
          python3 -m venv venv
          ./venv/bin/pip install keymap-drawer pyyaml
          echo "$(pwd)/venv/bin" >> $GITHUB_PATH

      - name: Install SVG renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Symlink keymap_features for include resolution
        run: ln -sfn "$(pwd)/config/keymap_features" "$(pwd)/config/keymaps/keymap_features"

      - name: Parse keymap
        run: |
          keymap -c keymap-drawer/configs/config-stacked.yaml parse -c 12 -z config/keymaps/qwerty.keymap \
            > keymap-drawer/stacked/qwerty.yaml
          keymap -c keymap-drawer/configs/config-combo.yaml parse -c 12 --virtual-layers "COMBOS" -z config/keymaps/qwerty.keymap \
            > keymap-drawer/stacked/combos.yaml

      - name: Generate stacked YAML
        run: python3 scripts/make_stacked.py

      - name: Draw stacked keymap
        run: |
          keymap -c keymap-drawer/configs/config-stacked.yaml draw -j config/qwerty.json \
            keymap-drawer/stacked/stacked.yaml > keymap-drawer/stacked/stacked.svg

      - name: Draw combos
        run: |
          keymap -c keymap-drawer/configs/config-combo.yaml draw \
            -j config/qwerty.json \
            -s "COMBOS" \
            --combos-only \
            keymap-drawer/stacked/combos.yaml > keymap-drawer/stacked/combos.svg

      - name: Draw `legend` key
        run: |
          keymap -c keymap-drawer/configs/config-stacked.yaml draw \
            --ortho-layout '{rows: 1, columns: 1}' \
            keymap-drawer/stacked/legend-1x1.yaml > keymap-drawer/stacked/legend.svg

      - name: Draw all-layers keymap
        run: |
          mkdir -p keymap-drawer/all_layers
          keymap -c keymap-drawer/configs/config-all-layers.yaml draw -j config/qwerty.json \
            keymap-drawer/stacked/qwerty.yaml > keymap-drawer/all_layers/all_layers.svg --keys-only

      - name: Install JetBrainsMono Nerd Font
        run: |
          FONT_ARCHIVE="$RUNNER_TEMP/JetBrainsMono.tar.xz"
          FONT_EXTRACT_DIR="$RUNNER_TEMP/jbfonts"
          FONT_INSTALL_DIR="$HOME/.local/share/fonts"

          curl -fsSL "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.tar.xz" \
            -o "$FONT_ARCHIVE"
          mkdir -p "$FONT_EXTRACT_DIR" "$FONT_INSTALL_DIR"
          tar -xJf "$FONT_ARCHIVE" -C "$FONT_EXTRACT_DIR"
          find "$FONT_EXTRACT_DIR" -type f \( \
            -name "JetBrainsMonoNerdFont-*.ttf" -o \
            -name "JetBrainsMonoNerdFontMono-*.ttf" \
          \) -exec cp {} "$FONT_INSTALL_DIR/" \;
          fc-cache -f "$FONT_INSTALL_DIR"
          fc-match "JetBrainsMono Nerd Font"

      - name: Convert stacked SVG to PNG
        run: |
          rsvg-convert \
            --background-color="${KEYMAP_BG}" \
            --zoom=2 \
            --output="keymap-drawer/stacked/stacked.png" \
            "keymap-drawer/stacked/stacked.svg"

      - name: Install Playwright (Chromium)
        run: |
          npm install playwright@latest
          npx playwright install-deps
          npx playwright install chromium

      - name: Render composite PNG with Playwright
        env:
          KEYMAP_BG: ${{ env.KEYMAP_BG }}
          KEYMAP_GAP: ${{ env.KEYMAP_GAP }}
          KEYMAP_MARGIN: ${{ env.KEYMAP_MARGIN }}
          KEYMAP_SCALE: ${{ env.KEYMAP_SCALE }}
          KEYMAP_HINTING: ${{ env.KEYMAP_HINTING }}
          KEYMAP_LEGEND: ${{ env.KEYMAP_LEGEND }}
          KEYMAP_STACKED_TRIM_BOTTOM: ${{ env.KEYMAP_STACKED_TRIM_BOTTOM }}
          KEYMAP_LEGEND_TRIM_TOP: ${{ env.KEYMAP_LEGEND_TRIM_TOP }}
          KEYMAP_LEGEND_TRIM_BOTTOM: ${{ env.KEYMAP_LEGEND_TRIM_BOTTOM }}
          KEYMAP_COMBOS_TRIM_TOP: ${{ env.KEYMAP_COMBOS_TRIM_TOP }}
        run: |
          node scripts/render_stacked_composite.js

      - name: Cleanup - Set permissions & Remove Symlink(s)
        run: |
          chmod 777 keymap-drawer/stacked/stacked.svg
          chmod 777 keymap-drawer/stacked/stacked.png
          chmod 777 keymap-drawer/stacked/legend.svg
          chmod 777 keymap-drawer/stacked/stacked-combos.png
          chmod 777 keymap-drawer/all_layers/all_layers.svg
          rm -f config/keymaps/keymap_features

      - name: Auto-commit keymap drawings
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update keymap drawings"
          file_pattern: keymap-drawer
