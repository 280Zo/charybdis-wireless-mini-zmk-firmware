<svg width="1020" height="428" viewBox="0 0 1020 428" class="keymap" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<style>/* inherit to force styles through use tags */
svg path {
    fill: inherit;
}

/* font and background color specifications */
svg.keymap {
    font-family: SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;
    font-size: 14px;
    font-kerning: normal;
    text-rendering: optimizeLegibility;
    fill: #24292e;
}

/* default key styling */
rect.key {
    fill: #f6f8fa;
}

rect.key, rect.combo {
    stroke: #c9cccf;
    stroke-width: 1;
}

/* default key side styling, only used is draw_key_sides is set */
rect.side {
    filter: brightness(90%);
}

/* color accent for combo boxes */
rect.combo, rect.combo-separate {
    fill: #cdf;
}

/* color accent for held keys */
rect.held, rect.combo.held {
    fill: #fdd;
}

/* color accent for ghost (optional) keys */
rect.ghost, rect.combo.ghost {
    stroke-dasharray: 4, 4;
    stroke-width: 2;
}

text {
    text-anchor: middle;
    dominant-baseline: middle;
}

/* styling for layer labels */
text.label {
    font-weight: bold;
    text-anchor: start;
    stroke: white;
    stroke-width: 4;
    paint-order: stroke;
}

/* styling for optional footer */
text.footer {
    text-anchor: end;
    dominant-baseline: auto;
    stroke: white;
    stroke-width: 4;
    paint-order: stroke;
}

/* styling for combo tap, and key non-tap label text */
text.combo, text.hold, text.shifted, text.left, text.right, text.tl, text.tr, text.bl, text.br {
    font-size: 11px;
}

text.hold, text.bl, text.br {
    text-anchor: middle;
    dominant-baseline: auto;
}

text.shifted, text.tl, text.tr {
    text-anchor: middle;
    dominant-baseline: hanging;
}

text.left, text.tl, text.bl {
    text-anchor: start;
}

text.right, text.tr, text.br {
    text-anchor: end;
}

text.layer-activator {
    text-decoration: underline;
}

/* styling for hold/shifted label text in combo box */
text.combo.hold, text.combo.shifted, text.combo.left, text.combo.right {
    font-size: 8px;
}

/* lighter symbol for transparent keys */
text.trans {
    fill: #7b7e81;
}

/* styling for combo dendrons */
path.combo {
    stroke-width: 1;
    stroke: gray;
    fill: none;
}

/* Start Tabler Icons Cleanup */
/* cannot use height/width with glyphs */
.icon-tabler > path {
    fill: inherit;
    stroke: inherit;
    stroke-width: 2;
}
/* hide tabler's default box */
.icon-tabler > path[stroke="none"][fill="none"] {
    visibility: hidden;
}
/* End Tabler Icons Cleanup */

svg.keymap { fill: #d1d6db; }
rect.key { fill: #3f4750; }
rect.key, rect.combo { stroke: #60666c; }
rect.combo, rect.combo-separate { fill: #1f3d7a; }
rect.held, rect.combo.held { fill: #854747; }
text.label, text.footer { stroke: black; }
text.trans { fill: #7e8184; }
path.combo { stroke: #7f7f7f; }


/* ── Stacked layer color palette ───────────────────────────────────── */
/* Edit only the fill values below to re-theme the whole stacked image.  */

/* Base  – center  – neutral white  */
text.tap { font-family: "JetBrainsMono Nerd Font"; fill: #cdd6f4; font-weight: bold; }

/* Nav   – top-left  – blue 89b4fa  */
text.tl  { font-family: "Iosevka Nerd Font"; fill: #70CAD1; font-size: 10px; }

/* Num   – top-right – green a6e3a1 */
text.tr  { font-family: "Iosevka Nerd Font"; fill: #9FCC2E; font-size: 10px; }

/* Xtra  – bot-left  – purple */
text.bl  { font-family: "Iosevka Nerd Font"; fill: #cba6f7; font-size: 10px; }

/* Sym   – bot-right – orange fab387 */
text.br  { font-family: "Iosevka Nerd Font";fill: #E98A15; font-size: 10px; }
</style>
