draw_config:
  key_w: 80
  key_h: 76
  split_gap: 30.0
  combo_w: 33
  combo_h: 31
  key_rx: 6.0
  key_ry: 6.0
  dark_mode: true
  n_columns: 1
  separate_combo_diagrams: false
  combo_diagrams_scale: 2
  inner_pad_w: 2.0
  inner_pad_h: 2.0
  outer_pad_w: 30.0
  outer_pad_h: 56.0
  line_spacing: 1.5
  arc_radius: 6.0
  append_colon_to_layer_header: true
  small_pad: 2.0
  legend_rel_x: 0
  legend_rel_y: 0
  draw_key_sides: false
  key_side_pars:
    rel_x: 0.0
    rel_y: 4.0
    rel_w: 12.0
    rel_h: 12.0
    rx: 4.0
    ry: 4.0
  svg_extra_style: |
    /* ── Theme Palette (all-layers) ─────────────────────────────────── */
    :root {
      /* Dark palette */
      --all-key-fill-dark: #292929;
      --all-key-border-dark: #3c3836;
      --all-tap-dark: #e2dfd4;
      --all-corner-dark: #4b8ca7;

      /* Light palette */
      --all-key-fill-light: #f7f3eb;
      --all-key-border-light: #c9c3b8;
      --all-tap-light: #3c3836;
      --all-corner-light: #076678;

      /* Active palette aliases (switch to *-light vars for light keycaps/legends) */
      --all-key-fill: var(--all-key-fill-dark);
      --all-key-border: var(--all-key-border-dark);
      --all-tap: var(--all-tap-dark);
      --all-corner: var(--all-corner-dark);
    }

    /* ── Layer Names (enabled for all-layers output) ───────────────────── */
    # text.label { display: none; }

    /* ── Keycap Background Color ───────────────────────────────────── */
    rect.key { fill: var(--all-key-fill); }

    /* ── Keycap Border Color ───────────────────────────────────────── */
    rect.key { stroke: var(--all-key-border); stroke-width: 1; }

    /* ── Stacked layer color palette ───────────────────────────────────── */
    /* Colors are sourced from the active theme aliases above. */

    /* Base - center - neutral white  */
    text.tap { font-family: "JetBrainsMono Nerd Font"; fill: var(--all-tap); font-size: 16px; }

    /* Nav  - top-left - blue  */
    text.tl  { font-family: "JetBrainsMono Nerd Font"; fill: var(--all-corner); font-size: 11px; font-weight: 600; fill-opacity: 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transform: translate(2px, 2px); }

    /* Num  - top-right- green */
    text.tr  { font-family: "JetBrainsMono Nerd Font"; fill: var(--all-corner); font-size: 11px; font-weight: 600; fill-opacity: 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transform: translate(-2px, 2px); }

    /* Xtra - bot-left - purple */
    text.bl  { font-family: "JetBrainsMono Nerd Font"; fill: var(--all-corner); font-size: 11px; font-weight: 600; fill-opacity: 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transform: translate(2px, -2px); }

    /* Sym  - bot-right- yellow */
    text.br  { font-family: "JetBrainsMono Nerd Font"; fill: var(--all-corner); font-size: 11px; font-weight: 600; fill-opacity: 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transform: translate(-2px, -2px); }

  shrink_wide_legends: 7
  style_layer_activators: true
  glyph_tap_size: 14
  glyph_hold_size: 12
  glyph_shifted_size: 10
  glyphs: {}
parse_config:
  preprocess: true
  skip_binding_parsing: false
  sticky_label: sticky
  toggle_label: toggle
  tap_toggle_label: tap-toggle
  trans_legend:
    t: ▽
    type: trans
  mark_alternate_layer_activators: false
  modifier_fn_map:
    left_ctrl: Ctl
    right_ctrl: Ctl
    left_shift: Sft
    right_shift: Sft
    left_alt: Alt
    right_alt: AGr
    left_gui: Gui
    right_gui: Gui
    keycode_combiner: "{mods}+ {key}"
    mod_combiner: "{mod_1}+{mod_2}"
    special_combinations:
      left_ctrl+left_alt+left_gui+left_shift: Hyper
      left_ctrl+left_alt+left_shift: Meh
