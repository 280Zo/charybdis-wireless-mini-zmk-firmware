draw_config:
  key_w: 80
  key_h: 76
  split_gap: 30.0
  combo_w: 33
  combo_h: 31
  key_rx: 6.0
  key_ry: 6.0
  dark_mode: true
  n_columns: 1
  separate_combo_diagrams: false
  combo_diagrams_scale: 2
  inner_pad_w: 2.0
  inner_pad_h: 2.0
  outer_pad_w: 30.0
  outer_pad_h: 56.0
  line_spacing: 1.5
  arc_radius: 6.0
  append_colon_to_layer_header: true
  small_pad: 2.0
  legend_rel_x: 0
  legend_rel_y: 0
  # Composite-only corner legend wraps for render_stacked_composite.js.
  # This does not affect keymap-drawer SVG output directly.
  composite_corner_legend_wrap_overrides:
    - keypos: 34
      corner: tl
      from: "SCREEN SHOT"
      lines: ["SCREEN", "SHOT"]
      tspan_style: "font-size: 90%"
      line_height_em: 1.05
      x_offset: 0
      y_offset: 2
    - keypos: 30
      corner: tl
      from: "NEW DIR"
      lines: ["NEW", "DIR"]
      tspan_style: "font-size: 90%"
      line_height_em: 1.05
      x_offset: 0
      y_offset: 2
    - keypos: 00
      corner: tl
      from: "ZMK Studio"
      lines: ["ZMK", "STUDIO"]
      tspan_style: "font-size: 90%"
      line_height_em: 1.05
      x_offset: 0
      y_offset: 2
    - keypos: 04
      corner: br
      from: "MV LN \uf0d8"
      lines: ["Line", "\uf0d8"]
      tspan_style: "font-size: 90%"
      line_height_em: 1.05
      x_offset: 0
      y_offset: -2
    - keypos: 28
      corner: br
      from: "MV LN \uf0d7"
      lines: ["Line", "\uf0d7"]
      tspan_style: "font-size: 90%"
      line_height_em: 1.05
      x_offset: 0
      y_offset: -2
  draw_key_sides: false
  key_side_pars:
    rel_x: 0.0
    rel_y: 4.0
    rel_w: 12.0
    rel_h: 12.0
    rx: 4.0
    ry: 4.0
  svg_extra_style: |
    /* ── Theme Palette (stacked) ───────────────────────────────────── */
    :root {
      /* Dark palette */
      --stack-key-fill-dark: #1d2021;   /* keycap background */
      --stack-key-border-dark: #3c3836; /* keycap outline */
      --stack-tap-dark: #ebdbb2;        /* main center legend text (tap label) */
      --stack-tl-dark: #458588;         /* top-left corner legend */
      --stack-tr-dark: #d79921;         /* top-right corner legend */
      --stack-bl-dark: #d65d0e;         /* bottom-left corner legend */
      --stack-br-dark: #98971a;         /* bottom-right corner legend */

      /* Light palette */
      --stack-key-fill-light: #f9f5d7;   /* keycap background */
      --stack-key-border-light: #ebdbb2; /* keycap outline */
      --stack-tap-light: #3c3836;        /* main center legend text (tap label) */
      --stack-tl-light: #076678;         /* top-left corner legend */
      --stack-tr-light: #b16286;         /* top-right corner legend */
      --stack-bl-light: #d65d0e;         /* bottom-left corner legend */
      --stack-br-light: #427b58;         /* bottom-right corner legend */

      /* Active palette aliases used by the actual CSS rules below */
      --stack-key-fill: var(--stack-key-fill-dark);
      --stack-key-border: var(--stack-key-border-dark);
      --stack-tap: var(--stack-tap-dark);
      --stack-tl: var(--stack-tl-dark);
      --stack-tr: var(--stack-tr-dark);
      --stack-bl: var(--stack-bl-dark);
      --stack-br: var(--stack-br-dark);
    }

    /* ── Hide Layer Names ───────────────────────────────────── */
    text.label { display: none; }

    /* ── Keycap Background Color ───────────────────────────────────── */
    rect.key { fill: var(--stack-key-fill); }

    /* ── Keycap Border Color ───────────────────────────────────────── */
    rect.key { stroke: var(--stack-key-border); stroke-width: 1; }

    /* ── Stacked layer color palette ───────────────────────────────────── */
    /* Colors are sourced from the active theme aliases above. */

    /* Base - center */
    text.tap { font-family: "JetBrainsMono Nerd Font"; fill: var(--stack-tap); font-size: 16px; }

    /* Xtra - top-left */
    text.tl  { font-family: "JetBrainsMono Nerd Font"; fill: var(--stack-tl); font-size: 11px; font-weight: 600; fill-opacity: 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transform: translate(2px, 2px); }

    /* Num  - top-right */
    text.tr  { font-family: "JetBrainsMono Nerd Font"; fill: var(--stack-tr); font-size: 11px; font-weight: 600; fill-opacity: 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transform: translate(-2px, 2px); }

    /* Nav  - bot-left */
    text.bl  { font-family: "JetBrainsMono Nerd Font"; fill: var(--stack-bl); font-size: 11px; font-weight: 600; fill-opacity: 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transform: translate(2px, -2px); }

    /* Sym  - bot-right */
    text.br  { font-family: "JetBrainsMono Nerd Font"; fill: var(--stack-br); font-size: 11px; font-weight: 600; fill-opacity: 1; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transform: translate(-2px, -2px); }

  shrink_wide_legends: 7
  style_layer_activators: true
  glyph_tap_size: 14
  glyph_hold_size: 12
  glyph_shifted_size: 10
  glyphs: {}
