draw_config:
  # key sizing
  key_w: 60
  key_h: 60
  key_rx: 6.0
  key_ry: 6.0
  dark_mode: true
  draw_key_sides: false
  # add breathing room around each keycap
  inner_pad_w: 4.0
  inner_pad_h: 4.0
  # outer_pad_h: 20   # adds top/bottom padding
  outer_pad_w: 125   # optional left/right padding
  legend_rel_x: 2.0
  legend_rel_y: 2.0

  # styling hooks
  svg_extra_style: |
    /* ── Hide Layer Names ───────────────────────────────────── */
    text.label { display: none; }

    /* ── Keycap Text Color ───────────────────────────────────── */
    text.tap { font-family: "JetBrainsMono Nerd Font"; fill: #137f8a; font-size: 16px; }

    /* ── Combo Boxes: fill and border color ───────────────── */
    rect.combo, rect.combo-separate {
      fill: transparent;
      stroke: #1d4d80;
      stroke-width: 0;
    }

    /* ── Combo connector readability ───────────────────────── */
    /* Round end-caps make dendrons visually enter the trigger keys. */
    path.combo {
      stroke-linecap: round;
      stroke-width: 1.6;
    }

    /* ── Keycap Background Color ───────────────────────────────────── */
    rect.key { fill: #363B3D; }

parse_config:
  preprocess: true
  skip_binding_parsing: false
  sticky_label: sticky
  toggle_label: toggle
  tap_toggle_label: tap-toggle
  zmk_combos:
    # Keep CapsWord centered.
    CapsWord:
      align: mid

    # Place corner bootloader combos on the inner side of each half.
    combo_bootloader_left:
      align: left
      offset: 0.4
    combo_bootloader_right:
      align: right
      offset: 0.4

    # Keep BT CLR above the board and route dendrons farther outward
    # so they stay opposite of the inner bootloader paths.
    combo_bt_clear_safe:
      align: top
      offset: 0.4
      # arc_scale: 1.15


  raw_binding_map:
    "&caps_word": "CAPS WORD"
    "&td_bore": "L_BASE L_EXTRA"
    "&mkp LCLK": "Left Click"
    "&mkp MCLK": "Mid Click"
    "&mkp RCLK": "Right Click"
    "&bootloader": "BOOT LOADER"
    "&bt BT_CLR": "BT CLEAR"
    "&kp LC(F10)": "ALL WIN"
    "&kp LC(F7)": "APP WIN"
